name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-backend.txt

      - name: Run tests
        run: pytest

      - name: Run deterministic model QA
        run: python scripts/evaluate_model_qa.py --set qa_sets/v1/deterministic.jsonl
